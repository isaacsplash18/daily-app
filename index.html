<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0a0a0a" />
<meta name="apple-mobile-web-app-title" content="Strength" />
<link rel="manifest" href="/manifest.json" />
<link rel="icon" href="/icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="/icon.svg" />
<title>Strength System</title>
<style>
  :root{
    --bg:#0a0a0a; --panel:#171717; --panel2:#1f1f1f; --line:#2a2a2a;
    --ink:#e5e5e5; --ink2:#a3a3a3; --ink3:#737373; --ink4:#525252;
    --amber:#fbbf24; --red:#f87171; --green:#34d399; --sky:#38bdf8;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
    padding:24px 16px calc(40px + env(safe-area-inset-bottom));}
  .wrap{max-width:480px;margin:0 auto}
  .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.25em;text-transform:uppercase;color:var(--amber)}
  h1{margin:4px 0 0;font-size:26px;letter-spacing:-.02em;color:#fafafa}
  .lead{margin:6px 0 0;font-size:12px;color:var(--ink3)}
  .card{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:16px;margin-top:16px}
  .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3)}
  .maxes{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px}
  .maxes label{display:block}
  .maxes span{display:block;text-align:center;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:4px}
  input{font-family:var(--mono);background:var(--bg);border:1px solid #3a3a3a;border-radius:6px;
    color:var(--ink);text-align:center;padding:8px 2px;width:100%;font-size:14px}
  input:focus{outline:none;border-color:var(--amber);box-shadow:0 0 0 1px var(--amber)}
  .maxes input{color:var(--amber);font-weight:700}
  .strip{display:flex;gap:6px;overflow-x:auto;padding:16px 0 4px;-webkit-overflow-scrolling:touch}
  .wk{position:relative;flex:0 0 auto;width:40px;height:48px;border:1px solid var(--line);background:var(--panel);
    border-radius:9px;color:var(--ink2);font-weight:600;display:flex;flex-direction:column;align-items:center;
    justify-content:center;gap:4px;cursor:pointer;font-family:var(--mono)}
  .wk.active{background:var(--amber);border-color:var(--amber);color:#0a0a0a}
  .dot{width:4px;height:4px;border-radius:50%}
  .wk .plane{position:absolute;top:3px;right:4px;font-size:9px;color:var(--sky);font-family:var(--sans)}
  .wkhead{display:flex;align-items:center;justify-content:space-between;margin-top:16px}
  .badge{border:1px solid;border-radius:5px;padding:2px 6px;font-family:var(--mono);font-size:10px;
    letter-spacing:.15em;text-transform:uppercase;margin-left:8px}
  .btn{border:1px solid #3a3a3a;background:transparent;color:var(--ink2);border-radius:9px;
    padding:8px 12px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans)}
  .btn.travel-on{border-color:var(--sky);background:rgba(56,189,248,.12);color:#7dd3fc}
  .tbanner{border:1px solid rgba(56,189,248,.3);background:rgba(56,189,248,.06);border-radius:9px;
    padding:12px;font-size:12px;color:#bae6fd;margin-top:16px}
  .sched{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:6px;margin-top:16px}
  .srow{display:flex;align-items:center;gap:10px;padding:8px}
  .srow .d{width:34px;font-family:var(--mono);font-size:12px;color:var(--ink3)}
  .srow .a{font-size:14px}
  .srow .s{font-size:12px;color:var(--ink4)}
  .srow.trow{background:rgba(56,189,248,.06);border-radius:8px}
  .srow.trow .a{color:var(--sky)}
  .planebtn{margin-left:auto;flex:none;width:28px;height:28px;border:1px solid #2a2a2a;background:transparent;
    color:var(--ink4);border-radius:7px;font-size:13px;cursor:pointer;line-height:1}
  .planebtn.on{border-color:var(--sky);background:rgba(56,189,248,.12);color:#7dd3fc}
  .hint{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)}
  .tflag{color:var(--sky);font-size:11px;font-weight:600}
  .day{border:1px solid var(--line);background:var(--panel);border-radius:12px;padding:16px;margin-top:16px}
  .dhead{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}
  .main{border-top:1px solid var(--line);padding-top:14px;margin-top:14px}
  .main:first-of-type{border-top:none;padding-top:0;margin-top:0}
  .mtop{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .mname{font-size:14px;font-weight:600;color:var(--ink)}
  .mspec{font-family:var(--mono);font-size:12px;color:var(--ink3);margin-top:2px}
  .wt{font-family:var(--mono);font-size:30px;font-weight:700;color:var(--amber);line-height:1;text-align:right}
  .wt.peak{color:var(--red)}
  .unit{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink4);text-align:right;margin-top:2px}
  .mnote{font-size:12px;color:var(--ink2);margin-top:6px}
  .fallback{font-size:12px;color:var(--ink2);margin-top:6px}
  .fallback b{color:var(--ink);font-weight:600}
  .logrow{display:flex;align-items:center;gap:8px;margin-top:8px}
  .logrow input{width:56px}
  .setn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4);width:38px}
  input::placeholder{color:var(--ink4)}
  .x{font-family:var(--mono);color:var(--ink4);font-size:12px}
  .acc{border-top:1px solid var(--line);margin-top:14px;padding-top:12px}
  .acc li{font-size:12px;color:var(--ink2);list-style:none;padding:3px 0}
  .acctop{display:flex;justify-content:space-between}
  .accstart{font-family:var(--mono);font-size:10px;color:var(--ink4);margin-top:1px}
  .accnote{font-size:10px;color:var(--ink4);margin:4px 0 4px}
  .acc ul{margin:6px 0 0;padding:0}
  .acc .p{font-family:var(--mono);color:var(--ink3)}
  .accswap{font-size:12px;color:var(--ink3);margin-top:8px}
  .warm{border:1px solid var(--line);background:#0d0d0d;border-radius:9px;padding:10px 12px;margin-bottom:14px}
  .warmh{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--amber);opacity:.85}
  .warmi{font-size:12px;color:var(--ink);margin-top:4px}
  .warms{font-size:12px;color:var(--ink3);margin-top:4px}
  .ramp{font-family:var(--mono);font-size:11px;color:var(--ink3);margin-top:6px}
  .ramp b{color:var(--ink2);font-weight:600}
  .ref{border:1px solid var(--line);background:var(--panel);border-radius:12px;margin-top:16px}
  .ref>button{width:100%;display:flex;justify-content:space-between;align-items:center;background:none;
    border:none;color:var(--ink2);padding:16px;font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    font-weight:600;cursor:pointer;font-family:var(--sans)}
  .refbody{padding:0 16px 16px}
  .ref h4{margin:0 0 4px;font-size:13px;color:var(--ink)}
  .ref p{margin:0 0 14px;font-size:12px;color:var(--ink2);line-height:1.5}
  .ref p:last-child{margin-bottom:0}
  .reset{display:block;margin:18px auto 0;background:none;border:none;color:var(--ink4);font-size:12px;cursor:pointer}
  .btnrow{display:flex;gap:18px;justify-content:center;margin-top:18px}
  .btnrow .reset{margin:0}
  .copybtn{margin-top:14px;width:100%;background:transparent;border:1px solid #2a2a2a;color:var(--ink2);
    border-radius:9px;padding:9px;font-size:12px;font-weight:500;cursor:pointer;font-family:var(--sans)}
  .copybtn:active{border-color:var(--amber);color:var(--amber)}
  .foot{text-align:center;font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#404040;margin-top:18px}
  .g{color:var(--green)} .a{color:var(--amber)} .r{color:var(--red)}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const WEEKS=[
 {n:1,phase:"Build",pct:.675},{n:2,phase:"Build",pct:.70},{n:3,phase:"Build",pct:.725},
 {n:4,phase:"Deload",pct:.60},{n:5,phase:"Strength",pct:.75},{n:6,phase:"Strength",pct:.775},
 {n:7,phase:"Strength",pct:.80},{n:8,phase:"Deload",pct:.65},{n:9,phase:"Peak",pct:.825},
 {n:10,phase:"Peak",pct:.85},{n:11,phase:"Peak",pct:.875},{n:12,phase:"Retest",pct:.80}];
const _n="";
const LIFTS={
 squat:{name:"Back squat",rm:"squat",fallback:"Goblet or Bulgarian split squat — 3 × 10–12 / leg @ RPE 8",
   sr:["4 × 6","4 × 6","4 × 5","3 × 5","4 × 4","4 × 4","4 × 3","3 × 4","3 × 3","3 × 2","Top 2","3×3 / test"],
   rpe:["7","7","8","5–6","8","8","8","5–6","8–9","9","9","9"],
   note:["Technique focus. Crisp.",_n,_n,"Deload. Keep it light.",_n,_n,_n,"Deload. Keep it light.",_n,_n,"Then 1 × 5 back-off @ 72.5%","New top single/triple if good, then update your max. Else 3×3."]},
 bench:{name:"Bench press",rm:"bench",fallback:"Push-ups or DB floor press — 3 sets, stop 2 reps short @ RPE 8",
   sr:["3 × 8","3 × 8","3 × 6","3 × 6","4 × 5","4 × 5","4 × 4","3 × 5","4 × 4","4 × 3","Top 3","3×4 / test"],
   rpe:["7","7","8","5–6","8","8","8","5–6","8–9","9","9","9"],
   note:["Technique focus.",_n,_n,"Deload. Keep it light.",_n,_n,_n,"Deload. Keep it light.",_n,_n,"Then 1 × 6 back-off @ 72.5%","New top triple if good, then update your max. Else 3×4."]},
 deadlift:{name:"Deadlift",rm:"deadlift",fallback:"DB Romanian or single-leg RDL — 3 × 10–12 @ RPE 8",
   sr:["3 × 5","3 × 5","3 × 4","2 × 5","3 × 3","3 × 3","3 × 3","2 × 4","2 × 3","2 × 2","Top 2","2×3 / test"],
   rpe:["7","7","8","5–6","8","8","8","5–6","8–9","9","9","9"],
   note:["Low volume by design.",_n,_n,"Deload. Keep it light.",_n,_n,_n,"Deload. Keep it light.",_n,_n,"Then 1 × 3 back-off @ 75%","New top single/double if good, then update your max. Else 2×3."]},
 ohp:{name:"Overhead press",rm:"ohp",fallback:"Pike push-up or DB shoulder press — 3 × 8–12 @ RPE 8",
   sr:["3 × 8","3 × 8","3 × 6","3 × 6","4 × 5","4 × 5","4 × 4","3 × 5","4 × 4","4 × 3","Top 3","3×4 / test"],
   rpe:["7","7","8","5–6","8","8","8","5–6","8–9","9","9","9"],
   note:["Technique focus.",_n,_n,"Deload. Keep it light.",_n,_n,_n,"Deload. Keep it light.",_n,_n,"Then 1 × 6 back-off @ 72.5%","New top triple if good, then update your max. Else 3×4."]}};
const ACC_A=[["Chin-up or lat pulldown","3 × 6–10","BW / ~45kg pulldown"],["Face pulls","2–3 × 12–15","~15–20kg or band"],["Rear-delt raise","2 × 12–15","4–6kg"],["Pallof press","3 × 10 / side","~10–15kg or band"]];
const ACC_B=[["Barbell row","3 × 6–10","~40kg"],["Bulgarian split squat (paused)","2–3 × 8–10 / leg","BW–2×10kg"],["Cuff external rotation","2 × 12–15","2–4kg or band"],["Pull-up","3 × 5–10","BW · band-assist or +load to fit reps"],["Single-arm suitcase carry","2–3 × 30 m / side","16–24kg"]];
const PHASE={Build:"#a3a3a3",Strength:"var(--amber)",Peak:"var(--red)",Deload:"var(--green)",Retest:"var(--red)"};
const DEFAULT={squat:100,bench:65,deadlift:110,ohp:40};

let S={oneRMs:{...DEFAULT},week:1,logs:{},travel:{},ref:false};
try{const r=localStorage.getItem("ss_state");if(r)S=Object.assign(S,JSON.parse(r));}catch(e){}
function persist(){try{localStorage.setItem("ss_state",JSON.stringify(S));}catch(e){}}

const r25=v=>Math.round(v/2.5)*2.5;
const fmt=v=>Number.isInteger(v)?String(v):v.toFixed(1);
function ramp(W){if(!W)return[];const out=["bar × 8"];let last=20;[[0.5,5],[0.7,3],[0.85,2]].forEach(function(s){const x=r25(W*s[0]);if(x>20&&x<W&&x!==last){out.push(fmt(x)+" × "+s[1]);last=x;}});return out;}
function parseSR(sr){var mx=sr.match(/(\d+)\s*[×x]\s*(\d+)/);if(mx)return{sets:+mx[1],reps:+mx[2]};var top=sr.match(/[Tt]op\s*(\d+)/);if(top)return{sets:1,reps:+top[1]};return{sets:1,reps:0};}
var DAYPLAN={Tue:{title:"Deadlift",mains:["deadlift","ohp"]},Thu:{title:"Squat",mains:["squat","bench"]}};
function fmtSet(st){if((st.w==null||st.w==="")&&(st.r==null||st.r===""))return null;return (st.w!==""&&st.w!=null?st.w:"?")+"×"+(st.r!==""&&st.r!=null?st.r:"?");}
function sessionText(day,title,mains){var out="Week "+S.week+" · "+day+" · "+title,any=false;mains.forEach(function(k){var L=LIFTS[k],lg=S.logs[S.week+":"+k]||{},sets=lg.sets||[],parts=[];sets.forEach(function(st){var s=fmtSet(st);if(s)parts.push(s);});if(parts.length){any=true;out+="\n"+L.name+": "+parts.join(", ");}});return any?out:out+"\nNo sets logged yet.";}
function fullLogText(){var out="Strength System — training log",found=false;for(var wk=1;wk<=WEEKS.length;wk++){var wl="";[["Tue","Deadlift",["deadlift","ohp"]],["Thu","Squat",["squat","bench"]]].forEach(function(g){var ln="";g[2].forEach(function(k){var L=LIFTS[k],lg=S.logs[wk+":"+k]||{},sets=lg.sets||[],parts=[];sets.forEach(function(st){var s=fmtSet(st);if(s)parts.push(s);});if(parts.length)ln+="\n    "+L.name+": "+parts.join(", ");});if(ln)wl+="\n  "+g[0]+" · "+g[1]+ln;});if(wl){found=true;out+="\n\nWeek "+wk+wl;}}return found?out:"Nothing logged yet.";}
function flash(btn){if(!btn)return;var t=btn.getAttribute("data-lbl")||btn.textContent;btn.textContent="Copied";setTimeout(function(){btn.textContent=t;},1200);}
function copyText(txt,btn){try{if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(function(){flash(btn);},function(){window.prompt("Copy your log:",txt);});}else{window.prompt("Copy your log:",txt);}}catch(e){window.prompt("Copy your log:",txt);}}
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

function weightCell(k){
  const w=WEEKS[S.week-1], rm=Number(S.oneRMs[k]);
  if(!rm) return "—";
  return fmt(r25(rm*w.pct));
}
function mainHTML(k,trav){
  const L=LIFTS[k], w=WEEKS[S.week-1], i=S.week-1;
  const peak=(w.phase==="Peak"||w.phase==="Retest");
  const key=S.week+":"+k, log=S.logs[key]||{};
  const note=L.note[i];
  const rmv=Number(S.oneRMs[L.rm]); const W=rmv?r25(rmv*w.pct):0;
  return `<div class="main">
    <div class="mtop">
      <div><div class="mname">${L.name}</div>
      <div class="mspec">${L.sr[i]} · ${Math.round(w.pct*100)}% · RPE ${L.rpe[i]}</div></div>
      <div><div class="wt ${peak?'peak':''}" id="wt-${k}">${weightCell(k)}</div><div class="unit">kg</div></div>
    </div>
    ${note?`<div class="mnote">${esc(note)}</div>`:""}
    ${(W&&!trav)?`<div class="ramp">Ramp: ${ramp(W).join("  →  ")}  →  <b>work</b></div>`:""}
    ${trav?`<div class="fallback"><b>Barbell if available.</b> Otherwise: ${esc(L.fallback)}</div>`:""}
    ${(function(){var pr=parseSR(L.sr[i]);var wl=log.sets||[];var rows="";for(var si=0;si<pr.sets;si++){var st=wl[si]||{};rows+='<div class="logrow"><span class="setn">Set '+(si+1)+'</span><input inputmode="decimal" placeholder="'+(W?fmt(W):'kg')+'" data-log="'+key+'" data-set="'+si+'" data-f="w" value="'+(st.w!=null?esc(st.w):'')+'"><span class="x">×</span><input inputmode="numeric" placeholder="'+(pr.reps||'reps')+'" data-log="'+key+'" data-set="'+si+'" data-f="r" value="'+(st.r!=null?esc(st.r):'')+'"></div>';}return rows;})()}
  </div>`;
}
function dayHTML(day,title,mains,acc,swap){
  const trav=!!S.travel[S.week+":"+day];
  return `<div class="day"><div class="dhead">${day} · ${title}${trav?' <span class="tflag">✈ travel</span>':''}</div>
    <div class="warm"><div class="warmh">Warm-up first</div>
      <div class="warmi"><b>1.</b> McGill Big 3 — curl-up, side plank, bird dog (activation)</div>
      <div class="warmi"><b>2.</b> Ramp each lift to its working weight (shown per lift below)</div>
      <div class="warms">Then your working sets, then accessories.</div></div>
    ${mains.map(k=>mainHTML(k,trav)).join("")}
    <div class="acc"><div class="lbl">Accessories</div>
      <div class="accnote">Starting loads to calibrate from. Run at RPE 8, never to failure. Add the smallest jump once you top the rep range.</div>
      <ul>${acc.map(a=>`<li><div class="acctop"><span>${a[0]}</span><span class="p">${a[1]}</span></div>${a[2]?`<div class="accstart">start ${a[2]}</div>`:""}</li>`).join("")}</ul>
      ${trav?`<div class="accswap">✈ ${esc(swap)}</div>`:""}
    </div>
    <button class="copybtn" data-copy="${day}" data-lbl="Copy this session">Copy this session</button></div>`;
}
function render(){
  const w=WEEKS[S.week-1];
  const DAYS=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  const dayT=d=>!!S.travel[S.week+":"+d];
  const anyT=DAYS.some(dayT);
  const weekT=n=>Object.keys(S.travel).some(k=>k.indexOf(n+":")===0&&S.travel[k]);
  const sched=[
    ["Mon","Boxing — technical","lighter, day after the run","Shadowboxing","6–8 × 3-min rounds","var(--ink2)"],
    ["Tue","Lift B","deadlift day","Lift B","deadlift — travel option in card","var(--amber)"],
    ["Wed","Boxing","","Shadowboxing","6–8 × 3-min rounds","var(--ink2)"],
    ["Thu","Lift A","squat day","Lift A","squat — travel option in card","var(--amber)"],
    ["Fri","HIIT / crossfit","your hard one","Bodyweight circuit","5 rounds, hard","var(--ink2)"],
    ["Sat","Rest","","Rest","","var(--ink4)"],
    ["Sun","Hard run","evening, with the group","Run, easy","keep it aerobic","var(--green)"]];
  document.getElementById("app").innerHTML=`
  <div class="eyebrow">Strength System</div>
  <h1>The Block</h1>
  <p class="lead">Evenings, around your Brothers classes. Earn the bar. Beat last week.</p>

  <div class="card"><div class="lbl">Your current 1RM · everything recalculates</div>
    <div class="maxes">
      ${[["squat","Squat"],["bench","Bench"],["deadlift","Dead"],["ohp","OHP"]].map(m=>
        `<label><span>${m[1]}</span><input inputmode="decimal" data-rm="${m[0]}" value="${S.oneRMs[m[0]]??''}"></label>`).join("")}
    </div></div>

  <div class="strip">${WEEKS.map(wk=>{
    const a=wk.n===S.week, t=weekT(wk.n);
    return `<button class="wk ${a?'active':''}" data-week="${wk.n}">
      <span>${wk.n}</span><span class="dot" style="background:${a?'#0a0a0a':PHASE[wk.phase]}"></span>
      ${t?'<span class="plane">✈</span>':''}</button>`;}).join("")}</div>

  <div class="wkhead">
    <div><b>Week ${S.week}</b><span class="badge" style="color:${PHASE[w.phase]};border-color:${PHASE[w.phase]}">${w.phase}</span></div>
    <span class="hint">tap ✈ on a day to mark travel</span>
  </div>
  ${anyT?`<div class="tbanner">Maintain, don't chase PBs. Keep the run, keep the pattern, keep the streak. The days you flagged are swapped for things you can do in any hotel.</div>`:""}

  <div class="sched">${sched.map(s=>{
    const d=s[0], t=dayT(d), label=t?s[3]:s[1], sub=t?s[4]:s[2], color=t?"var(--sky)":s[5];
    return `<div class="srow ${t?'trow':''}"><span class="d">${d}</span>
    <span class="a" style="color:${color}">${label}</span>${sub?`<span class="s">${sub}</span>`:""}
    <button class="planebtn ${t?'on':''}" data-travel="${d}" aria-label="Mark ${d} as a travel day">✈</button></div>`;}).join("")}</div>

  ${dayHTML("Tue","Deadlift",["deadlift","ohp"],ACC_B,"Travel swap: backpack RDLs, suitcase carries, band pull-aparts.")}
  ${dayHTML("Thu","Squat",["squat","bench"],ACC_A,"Travel swap: backpack rows, band or towel face pulls, planks.")}

  <div class="ref"><button data-act="ref">How to run it<span>${S.ref?'▲':'▼'}</span></button>
    ${S.ref?`<div class="refbody">
      <h4>Autoregulate off your Whoop</h4>
      <p><span class="g">Green (67+)</span> run the plan, chase the top set. <span class="a">Yellow (34–66)</span> keep the main lift, drop the RPE cap by one, cut the last accessory. <span class="r">Red (&lt;34)</span> technique day: main lift ~60% for crisp triples, then leave.</p>
      <h4>Consistency floor</h4>
      <p>Bad week? One squat, one press, one pull. 30 minutes. Showing up counts and keeps the streak alive.</p>
      <h4>The rules</h4>
      <p>Stop at the RPE cap, never grind to failure. Log every set and beat the same lift from last week by a rep. Deloads (weeks 4 and 8) should feel easy. Week 12 you retest, then update your maxes up top and the next block recalculates. Weights round to 2.5kg; the RPE cap matters more than the exact number.</p>
    </div>`:""}
  </div>

  <div class="btnrow">
    <button class="reset" data-act="reset">Reset logs</button>
    <button class="reset" data-act="copyall" data-lbl="Copy full log">Copy full log</button>
  </div>
  <div class="foot">The smarter you get, the stronger you get</div>`;
}

const app=document.getElementById("app");
app.addEventListener("input",e=>{
  const t=e.target;
  if(t.dataset.rm){
    const v=t.value; S.oneRMs[t.dataset.rm]=v===""?"":Number(v); persist();
    ["squat","bench","deadlift","ohp"].forEach(k=>{const el=document.getElementById("wt-"+k); if(el) el.textContent=weightCell(k);});
  } else if(t.dataset.log){
    const key=t.dataset.log, si=+t.dataset.set, f=t.dataset.f;
    const e=S.logs[key]=S.logs[key]||{}; const arr=e.sets=e.sets||[]; arr[si]=arr[si]||{}; arr[si][f]=t.value; persist();
  }
});
app.addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  if(b.dataset.week){S.week=Number(b.dataset.week);persist();render();}
  else if(b.dataset.done){const k=b.dataset.done;S.logs[k]=S.logs[k]||{};S.logs[k].done=!S.logs[k].done;persist();render();}
  else if(b.dataset.travel){const tk=S.week+":"+b.dataset.travel;S.travel[tk]=!S.travel[tk];persist();render();}
  else if(b.dataset.copy){const p=DAYPLAN[b.dataset.copy];if(p)copyText(sessionText(b.dataset.copy,p.title,p.mains),b);}
  else if(b.dataset.act==="copyall"){copyText(fullLogText(),b);}
  else if(b.dataset.act==="ref"){S.ref=!S.ref;render();}
  else if(b.dataset.act==="reset"){if(confirm("Clear all logged sets? Your maxes stay.")){S.logs={};persist();render();}}
});
render();
</script>
</body>
</html>
