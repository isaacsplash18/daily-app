<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Daily" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>Daily</title>
  <link rel="manifest" href="manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f0f;
      --surface: #141414;
      --surface2: #1a1a1a;
      --border: #222;
      --gold: #c8a96e;
      --green: #6dbf6d;
      --blue: #4a9eff;
      --text: #f0ede6;
      --muted: #888;
      --dim: #444;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 480px;
      margin: 0 auto;
      padding-bottom: calc(90px + var(--safe-bottom));
    }

    .header {
      padding: 52px 24px 0;
    }

    .day-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--dim);
    }

    .date-label {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      font-weight: 700;
      margin-top: 4px;
      color: var(--text);
    }

    .streak-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }

    .streak-badge {
      background: var(--gold);
      color: #0f0f0f;
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .streak-badge.empty {
      background: var(--surface2);
      color: var(--dim);
    }

    .habit-count {
      font-size: 12px;
      color: var(--dim);
    }

    .progress-wrap {
      padding: 16px 24px 0;
    }

    .progress-track {
      height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.4s ease;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--dim);
      margin-top: 6px;
    }

    .nav {
      display: flex;
      gap: 2px;
      margin: 20px 24px 0;
      background: var(--surface2);
      border-radius: 12px;
      padding: 3px;
    }

    .nav-btn {
      flex: 1;
      padding: 8px 0;
      border-radius: 9px;
      border: none;
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 400;
      letter-spacing: 0;
      transition: all 0.2s;
    }

    .nav-btn.active {
      background: var(--text);
      color: var(--bg);
      font-weight: 500;
    }

    .content {
      padding: 20px 24px 0;
    }

    .group-label {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 8px;
      margin-top: 22px;
    }

    .habit-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border-radius: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 7px;
      cursor: pointer;
      transition: all 0.2s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .habit-row.checked {
      background: #1a2a1a;
      border-color: #2d4a2d;
    }

    .habit-row:active {
      transform: scale(0.98);
    }

    .habit-icon {
      font-size: 17px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .habit-text {
      font-size: 13px;
      color: var(--muted);
      flex: 1;
      line-height: 1.3;
    }

    .habit-row.checked .habit-text {
      color: var(--green);
    }

    .checkmark {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .habit-row.checked .checkmark {
      background: var(--green);
      border-color: var(--green);
    }

    .complete-banner {
      background: linear-gradient(135deg, #1a2a1a, #0f1f0f);
      border: 1px solid #2d4a2d;
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
    }

    .complete-banner .star { font-size: 22px; margin-bottom: 4px; }
    .complete-banner .title { font-size: 14px; color: var(--green); font-weight: 500; }
    .complete-banner .sub { font-size: 11px; color: #4a7a4a; margin-top: 4px; }

    .section {
      margin-top: 28px;
    }

    .section-title {
      font-size: 9px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
    }

    .section-hint {
      font-size: 11px;
      color: var(--dim);
      font-style: italic;
      margin-bottom: 14px;
      line-height: 1.5;
    }

    .win-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 10px;
    }

    .win-num {
      font-size: 11px;
      color: var(--gold);
      font-weight: 500;
      margin-top: 11px;
      width: 14px;
      flex-shrink: 0;
    }

    textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      resize: none;
      line-height: 1.5;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus {
      border-color: var(--gold);
    }

    textarea::placeholder { color: var(--dim); }

    .save-btn {
      margin-top: 12px;
      padding: 11px 24px;
      background: var(--gold);
      color: #0f0f0f;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.3s;
      letter-spacing: 0.5px;
    }

    .save-btn.saved { background: var(--green); }

    .weekly-q { margin-bottom: 20px; }

    .weekly-label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
      font-style: italic;
      line-height: 1.5;
    }

    .history-day {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #1a1a1a;
    }

    .history-date { font-size: 13px; color: var(--muted); }

    .history-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .history-track {
      width: 80px;
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .history-fill {
      height: 100%;
      border-radius: 99px;
    }

    .history-pct {
      font-size: 11px;
      width: 30px;
      text-align: right;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(15,15,15,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      padding: 10px 0 calc(10px + var(--safe-bottom));
      display: flex;
      justify-content: center;
      gap: 2px;
      max-width: 480px;
      margin: 0 auto;
    }

    .tab-hint {
      font-size: 10px;
      color: var(--dim);
      text-align: center;
      padding: 20px 0 8px;
      font-style: italic;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script>
const HABITS = [
  { id: "gym", label: "CrossFit / movement", icon: "💪", time: "morning" },
  { id: "breakfast", label: "Real breakfast with protein", icon: "🥚", time: "morning" },
  { id: "deepwork", label: "Morning deep work block", icon: "🧠", time: "morning" },
  { id: "onepriority", label: "One clear priority done", icon: "✦", time: "day" },
  { id: "nophone", label: "Lunch break away from screen", icon: "☀️", time: "day" },
  { id: "dogwalk", label: "Evening walk with dogs & Rach", icon: "🐾", time: "evening" },
  { id: "dailythree", label: "Wrote my three wins", icon: "📝", time: "evening" },
  { id: "midnight", label: "In bed by midnight", icon: "🌙", time: "night" },
];

const WEEKLY_QS = [
  { id: "w1", label: "What did I do this week that aligned with who I want to be?" },
  { id: "w2", label: "One thing I want to do differently next week?" },
  { id: "w3", label: "What am I carrying that I need to put down?" },
];

const WIN_PLACEHOLDERS = [
  "Something that went well today...",
  "A moment you were present...",
  "Something small you're grateful for..."
];

function getTodayKey() {
  return new Date().toISOString().split("T")[0];
}

function getWeekKey() {
  const d = new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day === 0 ? -6 : 1);
  const monday = new Date(d);
  monday.setDate(diff);
  return monday.toISOString().split("T")[0];
}

function getDateStr() {
  return new Date().toLocaleDateString("en-SG", { weekday: "long", day: "numeric", month: "long" });
}

function isSunday() { return new Date().getDay() === 0; }

function loadData(key) {
  try { return JSON.parse(localStorage.getItem(key)) || {}; } catch(e) { return {}; }
}

function saveData(key, data) {
  try { localStorage.setItem(key, JSON.stringify(data)); } catch(e) {}
}

function getStreak() {
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 60; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = "habits_" + d.toISOString().split("T")[0];
    const data = loadData(key);
    const count = Object.values(data).filter(Boolean).length;
    if (count >= 5) { streak++; }
    else if (i > 0) { break; }
  }
  return streak;
}

// STATE
let state = {
  view: "daily",
  habits: {},
  wins: ["", "", ""],
  weekly: {},
  saved: false,
  savedTimer: null,
};

function loadToday() {
  state.habits = loadData("habits_" + getTodayKey());
  state.wins = loadData("wins_" + getTodayKey()).list || ["", "", ""];
  state.weekly = loadData("weekly_" + getWeekKey());
}

loadToday();

function render() {
  const todayKey = getTodayKey();
  const checkedCount = Object.values(state.habits).filter(Boolean).length;
  const total = HABITS.length;
  const pct = Math.round((checkedCount / total) * 100);
  const streak = getStreak();

  const progressColor = pct === 100 ? "#c8a96e" : "#4a9eff";

  document.getElementById("app").innerHTML = `
    <div class="header">
      <p class="day-label">Daily Check-in</p>
      <h1 class="date-label">${getDateStr()}</h1>
      <div class="streak-row">
        <span class="streak-badge ${streak === 0 ? 'empty' : ''}">
          ${streak > 0 ? `🔥 ${streak} day streak` : "Start your streak today"}
        </span>
        <span class="habit-count">${checkedCount}/${total} habits</span>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%; background:${progressColor};"></div>
      </div>
      <div class="progress-labels">
        <span>${pct}% complete</span>
        <span>${pct === 100 ? "✦ Perfect day" : `${total - checkedCount} to go`}</span>
      </div>
    </div>

    <div class="nav">
      <button class="nav-btn ${state.view === 'daily' ? 'active' : ''}" onclick="setView('daily')">Daily</button>
      <button class="nav-btn ${state.view === 'weekly' ? 'active' : ''}" onclick="setView('weekly')">Weekly</button>
      <button class="nav-btn ${state.view === 'history' ? 'active' : ''}" onclick="setView('history')">History</button>
    </div>

    <div class="content">
      ${state.view === 'daily' ? renderDaily(pct) : ''}
      ${state.view === 'weekly' ? renderWeekly() : ''}
      ${state.view === 'history' ? renderHistory() : ''}
    </div>
  `;
}

function renderDaily(pct) {
  const groups = ["morning", "day", "evening", "night"];
  const labels = { morning: "Morning", day: "Day", evening: "Evening", night: "Night" };

  let html = "";

  if (pct === 100) {
    html += `<div class="complete-banner">
      <div class="star">✦</div>
      <div class="title">Perfect Day</div>
      <div class="sub">Every habit done. This is the work.</div>
    </div>`;
  }

  groups.forEach(group => {
    const groupHabits = HABITS.filter(h => h.time === group);
    html += `<p class="group-label">${labels[group]}</p>`;
    groupHabits.forEach(habit => {
      const checked = !!state.habits[habit.id];
      html += `
        <div class="habit-row ${checked ? 'checked' : ''}" onclick="toggleHabit('${habit.id}')">
          <span class="habit-icon">${habit.icon}</span>
          <span class="habit-text">${habit.label}</span>
          <div class="checkmark">
            ${checked ? `<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="#0f0f0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ""}
          </div>
        </div>`;
    });
  });

  html += `<div class="section">
    <p class="section-title">Today's three wins</p>
    <p class="section-hint">Small things that went okay — not big wins, just evidence you showed up.</p>
    ${[0,1,2].map(i => `
      <div class="win-row">
        <span class="win-num">${i+1}.</span>
        <textarea rows="2" placeholder="${WIN_PLACEHOLDERS[i]}" 
          oninput="updateWin(${i}, this.value)">${escHtml(state.wins[i] || '')}</textarea>
      </div>`).join("")}
    <button class="save-btn ${state.saved ? 'saved' : ''}" onclick="saveWins()">
      ${state.saved ? "Saved ✓" : "Save wins"}
    </button>
  </div>`;

  return html;
}

function renderWeekly() {
  const hint = isSunday()
    ? "Sunday reflection — 20 minutes, honest answers."
    : "Weekly reflection — best done on Sundays, available anytime.";

  let html = `<p class="section-hint" style="margin-top:8px;">${hint}</p>`;

  WEEKLY_QS.forEach(q => {
    html += `<div class="weekly-q">
      <p class="weekly-label">${q.label}</p>
      <textarea rows="4" placeholder="Write honestly..." 
        oninput="updateWeekly('${q.id}', this.value)">${escHtml(state.weekly[q.id] || '')}</textarea>
    </div>`;
  });

  html += `<button class="save-btn ${state.saved ? 'saved' : ''}" onclick="saveWeekly()">
    ${state.saved ? "Saved ✓" : "Save reflection"}
  </button>`;

  return html;
}

function renderHistory() {
  let html = `<p class="group-label" style="margin-top:4px;">Last 30 days</p>`;
  const today = new Date();

  for (let i = 0; i < 30; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() - i);
    const key = "habits_" + d.toISOString().split("T")[0];
    const data = loadData(key);
    const count = Object.values(data).filter(Boolean).length;
    const hasData = Object.keys(data).length > 0;
    const p = Math.round((count / HABITS.length) * 100);
    const label = i === 0 ? "Today" : i === 1 ? "Yesterday" : d.toLocaleDateString("en-SG", { day: "numeric", month: "short" });
    const fillColor = p >= 75 ? "#6dbf6d" : p >= 50 ? "#c8a96e" : "#333";
    const pctColor = p >= 75 ? "#6dbf6d" : p >= 50 ? "#c8a96e" : "#444";

    html += `<div class="history-day">
      <span class="history-date">${label}</span>
      <div class="history-right">
        <div class="history-track">
          <div class="history-fill" style="width:${hasData ? p : 0}%; background:${fillColor};"></div>
        </div>
        <span class="history-pct" style="color:${pctColor};">${hasData ? p + "%" : "—"}</span>
      </div>
    </div>`;
  }

  return html;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ACTIONS
window.setView = function(v) {
  state.view = v;
  render();
};

window.toggleHabit = function(id) {
  state.habits[id] = !state.habits[id];
  saveData("habits_" + getTodayKey(), state.habits);
  render();
};

window.updateWin = function(i, val) {
  state.wins[i] = val;
};

window.saveWins = function() {
  saveData("wins_" + getTodayKey(), { list: state.wins });
  flashSaved();
};

window.updateWeekly = function(id, val) {
  state.weekly[id] = val;
};

window.saveWeekly = function() {
  saveData("weekly_" + getWeekKey(), state.weekly);
  flashSaved();
};

function flashSaved() {
  state.saved = true;
  render();
  clearTimeout(state.savedTimer);
  state.savedTimer = setTimeout(() => {
    state.saved = false;
    render();
  }, 2000);
}

render();
</script>
</body>
</html>
